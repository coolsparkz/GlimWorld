name: Rebrand gimworld to GlimWorld

on:
  workflow_dispatch:  # Manual trigger only - run from Actions tab

permissions:
  contents: write

jobs:
  rebrand:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Find and Replace gimworld with GlimWorld
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "gimworld"
          replace: "GlimWorld"
          include: "**/*"
          regex: false
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Rebrand: gimworld → GlimWorld" || echo "No changes to commit"
          git push
